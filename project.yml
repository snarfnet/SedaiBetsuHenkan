name: SedaiBetsuHenkan
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "18.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.sedaibetsuhenkan
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic

targets:
  SedaiBetsuHenkan:
    type: application
    platform: iOS
    sources: [SedaiBetsuHenkan]
    settings:
      base:
        INFOPLIST_FILE: SedaiBetsuHenkan/Info.plist
        PRODUCT_NAME: SedaiBetsuHenkan
    info:
      path: SedaiBetsuHenkan/Info.plist
      properties:
        CFBundleName: "世代別変換"
        CFBundleDisplayName: "世代別変換"
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
